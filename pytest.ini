[pytest]
# Warning policy
# -------------
# The suite runs clean. The only known noise is a third-party PENDING deprecation
# that langchain_core force-surfaces from langgraph at IMPORT time; because the
# library overrides standard warning filters, it is handled at the display layer
# in conftest.py (see that file for the full explanation). It is NOT our code
# using a deprecated API.
#
# We additionally error on DeprecationWarnings raised from OUR OWN package (`src`)
# so that if we ever adopt a deprecated API whose warning is emitted from our
# modules, the suite fails loudly. Third-party deprecation noise is left visible
# but non-fatal to avoid brittle failures when dependencies deprecate internals.
filterwarnings =
    error::DeprecationWarning:src
    error::PendingDeprecationWarning:src
