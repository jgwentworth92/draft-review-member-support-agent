services:
  agent:
    build: .
    image: draft-review-agent:latest
    ports:
      - "8000:8000"
    # Supply the model key(s) at runtime; copy .env.example to .env and fill it in.
    # The .env file is gitignored and dockerignored — never baked into the image.
    # Marked optional so `docker compose up` still works before .env exists
    # (the app boots; /draft then returns 503 until a key is provided).
    env_file:
      - path: .env
        required: false
    restart: unless-stopped
